name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # или 'master', смотря какая у тебя главная ветка

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ # Если у тебя package.json лежит прямо в корне, оставь так. Если внутри папки client, напиши ./client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/io/node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # папка, куда Vite собирает билд (если package.json в подпапке, то './client/dist')

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4